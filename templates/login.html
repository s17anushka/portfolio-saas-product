<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Outfit', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute w-96 h-96 bg-blue-600/20 rounded-full filter blur-[120px] bottom-10 right-10 -z-10"></div>
    
    <div class="glass-panel p-8 md:p-10 rounded-3xl w-full max-w-sm shadow-2xl">
        <h2 class="text-3xl font-extrabold mb-2 text-white">Welcome Back</h2>
        <p class="text-gray-400 text-sm mb-8">Login to manage your portfolio projects.</p>
        
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Username</label>
                <input type="text" name="username" required placeholder="e.g. anushka" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Password</label>
                <input type="password" name="password" required placeholder="Enter your password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500">
            </div>
            
            <button type="submit" class="w-full mt-4 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold py-3.5 px-4 rounded-xl hover:opacity-90 transition-all">
                Access Dashboard →
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-white/10 text-center">
            <p class="text-sm text-gray-400">Don't have a portfolio? <a href="/" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Create one</a></p>
        </div>
    </div>
</body>
</html>
